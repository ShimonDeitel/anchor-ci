name: Anchor
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Anchor:
    type: application
    platform: iOS
    sources:
      - path: Anchor
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.anchor
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Anchor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Anchor/Anchor.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AnchorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AnchorTests
      - path: Anchor.storekit
    dependencies:
      - target: Anchor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.anchor.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Anchor:
    build:
      targets:
        Anchor: all
        AnchorTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Anchor.storekit
    test:
      config: Debug
      storeKitConfiguration: Anchor.storekit
      targets:
        - AnchorTests
    archive:
      config: Release
